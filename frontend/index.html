<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PagePals — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">

  <div class="glow"></div>

  <div class="login-container">
    <div class="logo">
      <h1>PagePals</h1>
      <p>Your social reading journal</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Sign in</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
        <div>
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="your username" required />
        </div>
        <div>
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <div class="message" id="loginMsg"></div>
        <button type="submit" class="btn-primary">Sign in</button>
      </form>

      <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
        <div>
          <label>Username</label>
          <input type="text" id="regUsername" placeholder="choose a username" required />
        </div>
        <div>
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="••••••••" required />
        </div>
        <div class="message" id="registerMsg"></div>
        <button type="submit" class="btn-primary">Create account</button>
      </form>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
